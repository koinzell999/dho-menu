<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kitchen View — DHO</title>
  <meta name="robots" content="noindex, nofollow" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <style>
    html, body { height: 100%; }
    body {
      background: linear-gradient(to bottom, #072033 0%, #061825 100%);
      min-height: 100vh;
      color: #f1f5f9;
      font-family: system-ui, -apple-system, sans-serif;
    }

    /* New order ring animation */
    .ring-new {
      animation: ringNew 2s ease-out infinite;
    }
    @keyframes ringNew {
      0%,100% { box-shadow: 0 0 0 0 rgba(255,210,74,0); }
      50%      { box-shadow: 0 0 0 7px rgba(255,210,74,0.22); }
    }

    /* Card entrance */
    .card-in { animation: cardIn 0.28s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes cardIn { from { opacity:0; transform:translateY(10px) scale(0.97); } to { opacity:1; transform:none; } }

    /* Item rows */
    .item-row { display:flex; justify-content:space-between; align-items:baseline; padding:4px 0; }

    /* Action buttons */
    .k-btn {
      flex:1; padding:9px 6px; border-radius:10px; font-size:0.78rem; font-weight:700;
      cursor:pointer; border:1px solid; transition:all 0.14s; text-align:center;
    }
    .k-btn-prep   { background:rgba(251,146,60,0.14); color:#fb923c; border-color:rgba(251,146,60,0.35); }
    .k-btn-prep:hover   { background:rgba(251,146,60,0.28); }
    .k-btn-served { background:rgba(74,222,128,0.14); color:#4ade80; border-color:rgba(74,222,128,0.30); }
    .k-btn-served:hover { background:rgba(74,222,128,0.26); }
  </style>
</head>
<body class="min-h-screen">

  <!-- Auth loader -->
  <div id="authLoader" class="fixed inset-0 z-50 flex items-center justify-center bg-[#072033]">
    <div class="text-center">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-[#ffd24a] text-[#072033] text-2xl font-black mb-4 select-none">D</div>
      <p class="text-[#64748b] text-sm">Loading kitchen…</p>
    </div>
  </div>

  <div id="app" class="hidden min-h-screen flex flex-col">

    <!-- Header -->
    <header class="sticky top-0 z-40 border-b border-white/[0.07]" style="background:rgba(7,32,51,0.92); backdrop-filter:blur(12px);">
      <div class="max-w-5xl mx-auto px-4 h-14 flex items-center gap-3">

        <!-- Logo -->
        <div class="w-8 h-8 rounded-xl bg-[#ffd24a] text-[#072033] font-black flex items-center justify-center text-sm flex-shrink-0 select-none">D</div>
        <span class="font-bold text-white text-sm">Kitchen View</span>

        <!-- Live indicator -->
        <span class="w-2 h-2 rounded-full bg-[#4ade80] animate-pulse ml-1"></span>
        <span class="text-[#4ade80] text-xs font-semibold">Live</span>

        <!-- Spacer -->
        <div class="flex-1"></div>

        <!-- Nav -->
        <a href="cashier.html" class="text-xs font-semibold text-[#64748b] hover:text-white px-3 py-1.5 rounded-lg hover:bg-white/[0.07] transition-colors">
          Cashier
        </a>
        <button id="signOutBtn" class="text-xs font-semibold text-[#64748b] hover:text-white px-3 py-1.5 rounded-lg hover:bg-white/[0.07] transition-colors cursor-pointer border-none bg-transparent">
          Sign Out
        </button>
      </div>
    </header>

    <main class="flex-1 max-w-5xl mx-auto w-full px-4 py-5">

      <!-- New order alert banner -->
      <div id="alertBanner" class="hidden mb-5 px-4 py-3 rounded-xl bg-[#ffd24a]/12 border border-[#ffd24a]/28 text-[#ffd24a] text-sm font-semibold flex items-center gap-2">
        🔔 New order received!
      </div>

      <!-- Empty state -->
      <div id="emptyState" class="hidden text-center py-24">
        <div class="text-6xl mb-4">🍳</div>
        <p class="text-[#475569] font-semibold text-lg">No active orders</p>
        <p class="text-[#334155] text-sm mt-1">New orders will appear here instantly.</p>
      </div>

      <!-- Cards grid -->
      <div id="kitchenGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>

    </main>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC_7ilyQud2-zrMcT4v_JGBKHGTgzXucaE",
      authDomain: "dho-menu.firebaseapp.com",
      projectId: "dho-menu",
      storageBucket: "dho-menu.firebasestorage.app",
      messagingSenderId: "759293016064",
      appId: "1:759293016064:web:f0620da51e23d1ecf680e5"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db   = firebase.firestore();

    let prevNewCount = -1;  // -1 = first load (skip alert)
    let alertTimer   = null;

    /* ── Auth guard ─────────────────────────────────────── */
    auth.onAuthStateChanged(user => {
      if (!user) { window.location.replace('cashier-login.html'); return; }
      document.getElementById('authLoader').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      startListening();
    });

    document.getElementById('signOutBtn').addEventListener('click', () => {
      auth.signOut().then(() => window.location.replace('cashier-login.html'));
    });

    /* ── Real-time listener ─────────────────────────────── */
    function startListening() {
      db.collection('orders').onSnapshot(snapshot => {
        const active = [];
        snapshot.forEach(doc => {
          const d = doc.data();
          if (d.status === 'new' || d.status === 'preparing') {
            active.push({ id: doc.id, ...d });
          }
        });

        // Sort: newest first
        active.sort((a, b) => (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0));

        const newCount = active.filter(o => o.status === 'new').length;
        if (prevNewCount !== -1 && newCount > prevNewCount) showAlert();
        prevNewCount = newCount;

        render(active);
      });
    }

    /* ── Alert banner ───────────────────────────────────── */
    function showAlert() {
      const el = document.getElementById('alertBanner');
      el.classList.remove('hidden');
      if (alertTimer) clearTimeout(alertTimer);
      alertTimer = setTimeout(() => el.classList.add('hidden'), 5000);
    }

    /* ── Render grid ────────────────────────────────────── */
    function render(orders) {
      const grid   = document.getElementById('kitchenGrid');
      const empty  = document.getElementById('emptyState');
      grid.innerHTML = '';

      if (orders.length === 0) {
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');

      orders.forEach(order => {
        const isNew   = order.status === 'new';
        const ts      = order.timestamp ? new Date(order.timestamp.seconds * 1000) : null;
        const elapsed = ts ? Math.floor((Date.now() - ts.getTime()) / 60000) : null;
        const tableNum = order.tableId || order.id.replace('table', '');

        const el = document.createElement('div');
        el.className = `card-in bg-white/[0.04] border rounded-2xl p-5 flex flex-col gap-3 ${isNew ? 'border-[#ffd24a]/40 ring-new' : 'border-white/[0.09]'}`;

        const itemsHtml = (order.items || []).map(i => `
          <div class="item-row">
            <span class="text-[#e2e8f0] text-sm">${i.name}</span>
            <span class="text-[#ffd24a] font-bold text-sm ml-3 flex-shrink-0">×${i.qty}</span>
          </div>`).join('');

        const statusBadge = isNew
          ? `<span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold bg-[#ffd24a]/18 text-[#ffd24a] border border-[#ffd24a]/35">⚡ New</span>`
          : `<span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold bg-[#fb923c]/18 text-[#fb923c] border border-[#fb923c]/35">⏳ Preparing</span>`;

        const elapsedText = elapsed !== null
          ? `<span class="text-[#475569] text-xs">${elapsed === 0 ? 'just now' : elapsed + ' min ago'}</span>`
          : '';

        el.innerHTML = `
          <div class="flex items-center justify-between gap-2">
            <span class="font-bold text-white text-base">Table ${tableNum}</span>
            ${statusBadge}
          </div>
          ${elapsedText}
          <div class="border-t border-white/[0.07] pt-2">${itemsHtml}</div>
          <div class="flex gap-2 mt-auto pt-1">
            ${isNew ? `<button class="k-btn k-btn-prep" onclick="markPreparing('${order.id}')">Mark Preparing</button>` : ''}
            <button class="k-btn k-btn-served" onclick="markServed('${order.id}')">Mark Served</button>
          </div>`;

        grid.appendChild(el);
      });
    }

    /* ── Status updates ─────────────────────────────────── */
    async function markPreparing(tableKey) {
      try {
        await db.collection('orders').doc(tableKey).update({ status: 'preparing' });
      } catch (err) { console.error(err); }
    }

    async function markServed(tableKey) {
      try {
        await db.collection('orders').doc(tableKey).update({ status: 'served' });
      } catch (err) { console.error(err); }
    }
  </script>
</body>
</html>
