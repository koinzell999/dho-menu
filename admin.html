  <!-- Theme: apply instantly before paint -->
  <script>
    (function(){
      var t = localStorage.getItem('dho_theme');
      if(!t){
        var h = new Date().getHours();
        t = (h >= 7 && h < 19) ? 'light' : 'dark';
      }
      if(t === 'light') document.documentElement.classList.add('light-mode');
    })();
  </script>

    :root {
      --bg-from: #0b2b4a; --bg-to: #072033; --text-primary: #f7f7f7; --text-secondary: #cbd5e1;
      --accent: #ffd24a; --accent-dark: #072033; --surface: rgba(255,255,255,0.02); --surface-end: rgba(255,255,255,0.01);
      --surface-card: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.03); --border-light: rgba(255,255,255,0.06);
      --shadow: rgba(2,6,23,0.6); --toolbar-bg: rgba(11,43,74,0.8); --logo-shadow: rgba(0,0,0,0.35);
    }
    .light-mode {
      --bg-from: #f0f2f5; --bg-to: #e8ecf1; --text-primary: #1a2332; --text-secondary: #4a5568;
      --accent: #d4a017; --accent-dark: #ffffff; --surface: rgba(0,0,0,0.02); --surface-end: rgba(0,0,0,0.01);
      --surface-card: rgba(0,0,0,0.03); --border: rgba(0,0,0,0.06); --border-light: rgba(0,0,0,0.1);
      --shadow: rgba(0,0,0,0.12); --toolbar-bg: rgba(240,242,245,0.9); --logo-shadow: rgba(0,0,0,0.15);
    }
    body, footer { transition: background 0.25s ease, color 0.25s ease; }
    html { overflow-x: hidden; }
    body { background: linear-gradient(to bottom, var(--bg-from), var(--bg-to)) !important; color: var(--text-primary) !important; }

    #priceInputs {
      max-height: 58vh;
      overflow-y: auto;
      padding-right: 6px;
      scrollbar-width: thin;
      scrollbar-color: var(--accent) transparent;
    }
    #priceInputs::-webkit-scrollbar { width: 8px; }
    #priceInputs::-webkit-scrollbar-track { background: transparent; }
    #priceInputs::-webkit-scrollbar-thumb {
      background: color-mix(in srgb, var(--accent) 45%, transparent);
      border-radius: 999px;
    }

    .cat-header-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--accent);
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border-light);
      padding: 8px 0 6px;
      cursor: pointer;
    }

    .cat-rows.hidden { display: none; }

    .img-tools { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
    .img-btn {
      padding: 4px 8px;
      border-radius: 8px;
      border: 1px solid var(--border-light);
      background: transparent;
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }
    .img-btn:hover { border-color: var(--accent); color: var(--accent); }
    .img-preview { width: 56px; height: 42px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border-light); }
  </style>

  <!-- Theme toggle logic -->
  <script>
    (function(){
      var btn = document.getElementById('themeToggle'), root = document.documentElement;
      function getInitialTheme(){
        var saved = localStorage.getItem('dho_theme');
        if(saved === 'light' || saved === 'dark') return saved;
        var h = new Date().getHours();
        return (h >= 7 && h < 19) ? 'light' : 'dark';
      }
      function apply(light){ if(light){root.classList.add('light-mode');btn.textContent='☀️';btn.title='Switch to dark mode';}else{root.classList.remove('light-mode');btn.textContent='🌙';btn.title='Switch to light mode';} }
      apply(getInitialTheme() === 'light');
      btn.addEventListener('click',function(){ var g=!root.classList.contains('light-mode'); localStorage.setItem('dho_theme',g?'light':'dark'); apply(g); });
    })();
  </script>

    function resetIdleTimer() {
      if (idleTimer) clearTimeout(idleTimer);

      idleTimer = setTimeout(() => {
        auth.signOut();
        alert('Session expired due to inactivity. Please log in again.');

    ['mousemove', 'keydown', 'click', 'scroll', 'touchstart'].forEach(evt => {

          auth.signOut();
          document.getElementById('loginError').textContent = 'Access denied: admin account required.';
          document.getElementById('loginError').classList.remove('hidden');

        console.error("Failed to load prices:", err);

    function resizeImageFileToBlob(file, maxWidth = 720, quality = 0.82) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const img = new Image();
          img.onload = () => {
            const scale = Math.min(1, maxWidth / img.width);
            const canvas = document.createElement('canvas');
            canvas.width = Math.round(img.width * scale);
            canvas.height = Math.round(img.height * scale);
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            canvas.toBlob((blob) => {
              if (!blob) {
                reject(new Error('Image conversion failed.'));
                return;
              }
              resolve(blob);
            }, 'image/jpeg', quality);
          };
          img.onerror = reject;
          img.src = reader.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function renderPriceForm() {
      const container = document.getElementById('priceInputs');
      container.innerHTML = '';
      menuCategories.forEach(cat => {
        const section = document.createElement('div');
        section.className = 'cat-section mt-2';
        section.dataset.cat = cat.name;

        const headerBtn = document.createElement('button');
        headerBtn.type = 'button';
        headerBtn.className = 'cat-header-btn';
        headerBtn.innerHTML = `<span>${cat.name}</span><span>${collapsedCats[cat.name] ? '▸' : '▾'}</span>`;

        const rowsWrap = document.createElement('div');
        rowsWrap.className = `cat-rows ${collapsedCats[cat.name] ? 'hidden' : ''}`;

        headerBtn.addEventListener('click', () => {
          collapsedCats[cat.name] = !collapsedCats[cat.name];
          rowsWrap.classList.toggle('hidden', collapsedCats[cat.name]);
          headerBtn.innerHTML = `<span>${cat.name}</span><span>${collapsedCats[cat.name] ? '▸' : '▾'}</span>`;
        });

        section.appendChild(headerBtn);
        section.appendChild(rowsWrap);
        container.appendChild(section);

        cat.items.forEach(key => {
          const isHidden = !!hiddenItems[key];
          const hasCustomImage = !!imageOverrides[key];
          const imgSrc = resolveImageOverrideUrl(imageOverrides[key]) || getDefaultImageForKey(key);
          const div = document.createElement('div');
          div.className = 'flex flex-col sm:flex-row justify-between items-start sm:items-center gap-1 sm:gap-3 price-row py-1';
          div.dataset.name = itemNames[key].toLowerCase();
          div.dataset.key = key;
          div.dataset.hidden = isHidden ? '1' : '0';
          div.innerHTML = `
            <div class="flex items-center gap-2 w-full sm:w-auto">
              <img src="${imgSrc}" alt="${itemNames[key]}" class="img-preview" />
              <label class="font-bold text-sm ${isHidden ? 'line-through opacity-60' : ''}">${itemNames[key]}</label>
            </div>
            <div class="w-full sm:w-auto">
              <div class="flex w-full sm:w-auto items-center gap-2">
              <input type="number" name="${key}" value="${prices[key]}" class="w-full sm:w-24 p-2 sm:p-1 rounded text-center text-base" style="background:var(--surface-card); border:1px solid var(--border-light); color:var(--text-primary);" min="0" inputmode="numeric" required>
              <button type="button" onclick="toggleItemVisibility('${key}')" class="py-1.5 px-2.5 rounded text-xs font-bold" style="border:1px solid ${isHidden ? 'rgba(74,222,128,0.35)' : 'rgba(248,113,113,0.35)'}; color:${isHidden ? '#4ade80' : '#f87171'}; background:${isHidden ? 'rgba(74,222,128,0.10)' : 'rgba(248,113,113,0.10)'};">${isHidden ? 'Show' : 'Hide'}</button>
              </div>
              <div class="img-tools">
                <button type="button" class="img-btn" onclick="document.getElementById('imgFile_${key}').click()">Upload</button>
                <button type="button" class="img-btn" onclick="setImageFromUrl('${key}')">URL</button>
                <button type="button" class="img-btn" onclick="resetItemImage('${key}')" ${hasCustomImage ? '' : 'disabled'} style="${hasCustomImage ? '' : 'opacity:0.45;cursor:not-allowed;'}">Reset</button>
                <input id="imgFile_${key}" type="file" accept="image/*" style="display:none" onchange="setImageFromFile('${key}', this)" />
              </div>
            </div>
          `;
          rowsWrap.appendChild(div);
        });
      });

      // Re-apply active filters after redraw.
      filterPrices(document.getElementById('priceSearch').value || '');
    }

    async function toggleItemVisibility(key) {
      const wasHidden = !!hiddenItems[key];
      if (wasHidden) delete hiddenItems[key];
      else hiddenItems[key] = true;

      try {
        await persistMenuSettings();
        renderPriceForm();
        filterPrices(document.getElementById('priceSearch').value || '');
      } catch (err) {
        if (wasHidden) hiddenItems[key] = true;
        else delete hiddenItems[key];
        document.getElementById('saveMessage').textContent = 'Error: ' + err.message;
        document.getElementById('saveMessage').className = 'text-red-400 mt-2';
      }
    }

    async function setImageFromFile(key, input) {
      const file = input.files && input.files[0];
      if (!file) return;
      if (!file.type.startsWith('image/')) {
        alert('Please choose an image file.');
        input.value = '';
        return;
      }
      try {
        const previous = imageOverrides[key];
        if (previous && typeof previous === 'object' && previous.path) {
          try { await storage.ref(previous.path).delete(); } catch (_) {}
        }

        const blob = await resizeImageFileToBlob(file);
        const path = `menu-images/${key}/${Date.now()}-${Math.random().toString(36).slice(2,8)}.jpg`;
        const ref = storage.ref(path);
        await ref.put(blob, { contentType: 'image/jpeg', cacheControl: 'public,max-age=31536000,immutable' });
        const url = await ref.getDownloadURL();

        imageOverrides[key] = { url, path, source: 'storage', updatedAt: Date.now() };
        await persistMenuSettings();
        renderPriceForm();
      } catch (err) {
        alert('Failed to upload image: ' + err.message);
      } finally {
        input.value = '';
      }
    }

    async function setImageFromUrl(key) {
      const current = resolveImageOverrideUrl(imageOverrides[key]) || '';
      const raw = prompt('Paste image URL (https://...)', current);
      if (raw === null) return;
      const url = raw.trim();
      if (!url) {
        delete imageOverrides[key];
      } else if (!/^https?:\/\//i.test(url) && !/^data:image\//i.test(url)) {
        alert('Please enter a valid image URL.');
        return;
      } else {
        const previous = imageOverrides[key];
        if (previous && typeof previous === 'object' && previous.path) {
          try { await storage.ref(previous.path).delete(); } catch (_) {}
        }
        imageOverrides[key] = { url, source: 'url', updatedAt: Date.now() };
      }
      try {
        await persistMenuSettings();
        renderPriceForm();
      } catch (err) {
        alert('Failed to save image URL: ' + err.message);
      }
    }

    async function resetItemImage(key) {
      if (!imageOverrides[key]) return;
      const previous = imageOverrides[key];
      if (previous && typeof previous === 'object' && previous.path) {
        try { await storage.ref(previous.path).delete(); } catch (_) {}
      }
      delete imageOverrides[key];
      try {
        await persistMenuSettings();
        renderPriceForm();
      } catch (err) {
        alert('Failed to reset image: ' + err.message);
      }
    }

    function filterPrices(query) {
      const q = query.trim().toLowerCase();
      const hiddenOnly = document.getElementById('hiddenOnlyToggle').checked;
      const rows = document.querySelectorAll('.price-row');
      const sections = document.querySelectorAll('.cat-section');
      // hide/show rows
      rows.forEach(row => {
        const matchText = !q || row.dataset.name.includes(q) || row.dataset.key.includes(q);
        const matchHidden = !hiddenOnly || row.dataset.hidden === '1';
        row.style.display = (matchText && matchHidden) ? '' : 'none';
      });
      // hide category blocks that have no visible rows
      sections.forEach(section => {
        const rowsWrap = section.querySelector('.cat-rows');
        const header = section.querySelector('.cat-header-btn');
        let hasVisible = false;
        rowsWrap.querySelectorAll('.price-row').forEach(r => {
          if (r.style.display !== 'none') hasVisible = true;
        });
        section.style.display = hasVisible ? '' : 'none';
        if (hasVisible && q) {
          rowsWrap.classList.remove('hidden');
          header.innerHTML = `<span>${section.dataset.cat}</span><span>▾</span>`;
        }
      });
    }

    document.getElementById('priceSearch').addEventListener('input', function() {
      const val = this.value;
      document.getElementById('clearSearch').classList.toggle('hidden', !val);
      filterPrices(val);
    });
    document.getElementById('clearSearch').addEventListener('click', function() {
      const inp = document.getElementById('priceSearch');
      inp.value = '';
      this.classList.add('hidden');
      filterPrices('');
      inp.focus();
    });
    document.getElementById('hiddenOnlyToggle').addEventListener('change', function() {
      filterPrices(document.getElementById('priceSearch').value || '');
    });

    // Save
    document.getElementById('priceForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const formData = new FormData(this);
      const newPrices = {};
      for (let [key, value] of formData.entries()) {
        newPrices[key] = parseInt(value);
      }
      prices = newPrices;
      db.collection("prices").doc("menu").set(newPrices)
        .then(() => {
          document.getElementById('saveMessage').textContent = 'Prices updated successfully!';
          document.getElementById('saveMessage').className = 'text-green-400 mt-2';
          setTimeout(() => document.getElementById('saveMessage').classList.add('hidden'), 3000);
        })
        .catch((err) => {
          console.error("Save failed:", err);
          document.getElementById('saveMessage').textContent = 'Error: ' + err.message;
          document.getElementById('saveMessage').className = 'text-red-400 mt-2';
        });
    });
  </script>
  <script>
    const backToTopBtn = document.getElementById('backToTop');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 300) {
        backToTopBtn.style.opacity = '1';
        backToTopBtn.style.pointerEvents = 'auto';
      } else {
        backToTopBtn.style.opacity = '0';
        backToTopBtn.style.pointerEvents = 'none';
      }
    });
  </script>
</body>
</html>
