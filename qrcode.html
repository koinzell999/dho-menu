<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>QR Codes — DHO Menu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @media print {
      .no-print { display: none !important; }
      .qr-card { break-inside: avoid; page-break-inside: avoid; }
    }
  </style>
</head>
<body class="m-0 font-sans bg-gray-100 min-h-screen">
  <div class="max-w-5xl mx-auto p-8">
    <!-- Header -->
    <div class="text-center mb-10 no-print">
      <h1 class="text-3xl font-bold text-[#072033] mb-1">DHO Menu — Table QR Codes</h1>
      <p class="text-[#555]">Print and place each QR code on the corresponding table</p>
      <button onclick="window.print()" class="mt-4 bg-[#ffd24a] text-[#072033] py-2 px-8 rounded-lg font-bold cursor-pointer text-sm shadow">
        Print All QR Codes
      </button>
    </div>

    <!-- QR Grid -->
    <div id="qr-grid" class="grid grid-cols-2 md:grid-cols-3 gap-8">
    </div>
  </div>

  <script>
    const BASE_URL = 'https://dho-menu.web.app';
    const TABLE_COUNT = 6;
    const grid = document.getElementById('qr-grid');

    for (let t = 1; t <= TABLE_COUNT; t++) {
      const tableUrl = `${BASE_URL}?table=${t}`;
      const encodedUrl = encodeURIComponent(tableUrl);
      const qrSrc = `https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=${encodedUrl}`;

      const card = document.createElement('div');
      card.className = 'qr-card bg-white rounded-2xl shadow-lg p-6 flex flex-col items-center text-center border-4 border-[#ffd24a]';
      card.innerHTML = `
        <p class="text-xs font-semibold text-[#888] uppercase tracking-widest mb-1">DHO Menu</p>
        <h2 class="text-2xl font-bold text-[#072033] mb-4">Table ${t}</h2>
        <img src="${qrSrc}" alt="QR for Table ${t}" class="rounded-lg" width="220" height="220" />
        <p class="mt-3 text-xs text-[#aaa] break-all">${tableUrl}</p>
      `;
      grid.appendChild(card);
    }
  </script>
</body>
</html>
