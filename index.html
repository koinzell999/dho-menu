  <!-- Theme: apply instantly before paint to prevent flash -->

    (function(){

        var h = new Date().getHours();

    /* ====== Weekly click tracking ====== */
    function getWeekKey() {
      const now = new Date();
      const jan1 = new Date(now.getFullYear(), 0, 1);
      const days = Math.floor((now - jan1) / 86400000);
      const week = Math.ceil((days + jan1.getDay() + 1) / 7);
      return now.getFullYear() + '-W' + String(week).padStart(2, '0');
    }

    function recordClick(itemKey) {
      const weekKey = getWeekKey();
      db.collection("clicks").doc(weekKey).set(
        { [itemKey]: firebase.firestore.FieldValue.increment(1) },
        { merge: true }
      ).catch(err => console.warn("Click tracking failed:", err));
    }

    async function loadWeeklyPopular() {
      try {
        const weekKey = getWeekKey();
        const doc = await db.collection("clicks").doc(weekKey).get();
        if (doc.exists) {
          const data = doc.data();
          // Build reverse map: L key → M key
          const lToM = {};
          Object.entries(sizePairs).forEach(([m, l]) => { lToM[l] = m; });
          // All M-only item keys from every category (except popular itself)
          const allItemKeys = new Set();
          menuStructure.forEach(cat => {
            if (cat.key !== 'popular') cat.items.forEach(k => allItemKeys.add(k));
          });
          // Merge L clicks into their M counterpart
          const merged = {};
          Object.entries(data).forEach(([k, v]) => {
            const mKey = lToM[k] || k;
            if (!allItemKeys.has(mKey)) return;
            merged[mKey] = (merged[mKey] || 0) + v;
          });
          // Sort by click count descending, take top 6
          const sorted = Object.entries(merged)
            .filter(([k]) => !hiddenItems[k])
            .sort((a, b) => b[1] - a[1])
            .slice(0, 6)
            .map(([k]) => k);
          if (sorted.length > 0) weeklyPopularItems = sorted;
        }
      } catch (err) {
        console.warn("Failed to load popular items:", err);
      }
    }

          db.collection("prices").doc("menu").get(),
          db.collection("settings").doc("menu").get()
        ]);
        if (priceDoc.exists) {
          const remote = priceDoc.data();
          // Only apply remote prices for keys that exist in the current menu
          const merged = { ...defaultPrices };
          for (const key of Object.keys(defaultPrices)) {
            if (remote[key] !== undefined) merged[key] = remote[key];
          }
          prices = merged;
        }
        if (settingsDoc.exists) {
          hiddenItems = settingsDoc.data().hiddenItems || {};
          imageOverrides = settingsDoc.data().imageOverrides || {};
        }
      } catch (e) {
        console.error("Error loading prices:", e);
      }
      await loadWeeklyPopular();
      // Update popular category with this week's top items (fallback to pop1)
      const popCat = menuStructure.find(c => c.key === 'popular');
      if (popCat) {
        popCat.items = weeklyPopularItems.length > 0 ? weeklyPopularItems : ['pop1'];
      }
      render();

    const RESTAURANT_LAT = 36.752126;
    const RESTAURANT_LNG = 34.533231;
    const DINE_IN_RADIUS_M = 200;

    function haversineDistance(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const toRad = d => d * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function buildReceipt(deliveryInfo) {
      const totalItems = state.order.reduce((s,i) => s + i.qty, 0);
      const total = state.order.reduce((s,i) => s + i.price * i.qty, 0);
      const L = state.lang;
      const headers = { en: '🧾 *DHO Order*', tr: '🧾 *DHO Sipariş*', ar: '🧾 *طلب DHO*', es: '🧾 *DHO Pedido*', de: '🧾 *DHO Bestellung*', fr: '🧾 *DHO Commande*', ru: '🧾 *DHO Заказ*' };
      const itemLabel = { en: 'Items', tr: 'Ürünler', ar: 'العناصر', es: 'Artículos', de: 'Artikel', fr: 'Articles', ru: 'Позиций' };
      const totalLabel = { en: 'Total', tr: 'Toplam', ar: 'المجموع', es: 'Total', de: 'Gesamt', fr: 'Total', ru: 'Итого' };
      const thanksLabel = { en: 'Thank you! 🙏', tr: 'Teşekkürler! 🙏', ar: 'شكراً لكم! 🙏', es: '¡Gracias! 🙏', de: 'Danke! 🙏', fr: 'Merci! 🙏', ru: 'Спасибо! 🙏' };

      let msg = headers[L] + '\n';
      if (state.table) {
        msg += `🪑🪑🪑 *TABLE ${state.table}* 🪑🪑🪑\n`;
      }
      if (deliveryInfo) {
        const dlvLabel = { en: '🚚 *Delivery*', tr: '🚚 *Teslimat*', ar: '🚚 *توصيل*', es: '🚚 *Entrega*', de: '🚚 *Lieferung*', fr: '🚚 *Livraison*', ru: '🚚 *Доставка*' };
        msg += dlvLabel[L] + '\n';
      }
      msg += '━━━━━━━━━━━━━━━\n';
      state.order.forEach(item => {
        msg += `• ${item.name} × ${item.qty} — ${formatPrice(item.price * item.qty)}\n`;
      });
      msg += '━━━━━━━━━━━━━━━\n';
      msg += `*${totalLabel[L]}:* ${formatPrice(total)} (${totalItems} ${itemLabel[L]})\n`;

      if (deliveryInfo) {
        const nameL = { en: 'Name', tr: 'İsim', ar: 'الاسم' };
        const phoneL = { en: 'Phone', tr: 'Telefon', ar: 'الهاتف' };
        const addrL = { en: 'Address', tr: 'Adres', ar: 'العنوان' };
        const payL = { en: 'Payment', tr: 'Ödeme', ar: 'الدفع' };
        const payValues = {
          cash: { en: 'Cash on Delivery', tr: 'Kapıda Nakit', ar: 'الدفع نقداً عند التوصيل', es: 'Pago en efectivo', de: 'Barzahlung', fr: 'Paiement en espèces', ru: 'Наличные' },
          card: { en: 'Card on Delivery', tr: 'Kapıda Kart', ar: 'الدفع بالبطاقة عند التوصيل', es: 'Pago con tarjeta', de: 'Kartenzahlung', fr: 'Paiement par carte', ru: 'Карта' },
          bank: { en: 'Bank Transfer', tr: 'Banka Transferi', ar: 'تحويل بنكي', es: 'Transferencia bancaria', de: 'Banküberweisung', fr: 'Virement bancaire', ru: 'Банковский перевод' }
        };
        msg += '\n';
        msg += `📛 *${nameL[L]}:* ${deliveryInfo.name}\n`;
        msg += `📞 *${phoneL[L]}:* ${deliveryInfo.phone}\n`;
        msg += `📍 *${addrL[L]}:* ${deliveryInfo.address}\n`;
        msg += `💳 *${payL[L]}:* ${payValues[deliveryInfo.payment][L]}\n`;
      }

      msg += '\n' + thanksLabel[L];
      return msg;
    }

    function sendToWhatsApp(deliveryInfo) {
      const msg = buildReceipt(deliveryInfo || null);
      const encoded = encodeURIComponent(msg);
      window.open(`https://wa.me/905377177719?text=${encoded}`, '_blank');
      state.order = [];
      renderOrder();
    }

    function _setCheckoutStep(step) {
      [['csStep2',2],['csStep3',3],['csStep4',4]].forEach(([id, n]) => {
        const el = document.getElementById(id);
        el.classList.remove('cs-done','cs-active');
        if (n < step) el.classList.add('cs-done');
        else if (n === step) el.classList.add('cs-active');
      });
      const l23 = document.getElementById('csLine23');
      const l34 = document.getElementById('csLine34');
      l23.classList.toggle('cs-line-done', step >= 3);
      l34.classList.toggle('cs-line-done', step >= 4);
    }

    function updateDeliveryModalLabels() {
      const L = state.lang;
      const titles   = { en:'Delivery Details', tr:'Teslimat Bilgileri', ar:'تفاصيل التوصيل', es:'Detalles de entrega', de:'Lieferdetails', fr:'Détails de livraison', ru:'Детали доставки' };
      const names    = { en:'Name', tr:'İsim', ar:'الاسم', es:'Nombre', de:'Name', fr:'Nom', ru:'Имя' };
      const phones   = { en:'Phone', tr:'Telefon', ar:'الهاتف', es:'Teléfono', de:'Telefon', fr:'Téléphone', ru:'Телефон' };
      const addrs    = { en:'Address', tr:'Adres', ar:'العنوان', es:'Dirección', de:'Adresse', fr:'Adresse', ru:'Адрес' };
      const payTitl  = { en:'Payment Method', tr:'Ödeme Yöntemi', ar:'طريقة الدفع', es:'Método de pago', de:'Zahlungsmethode', fr:'Mode de paiement', ru:'Способ оплаты' };
      const sends    = { en:'Confirm Order ✓', tr:'Siparişi Onayla ✓', ar:'✓ تأكيد الطلب', es:'Confirmar pedido ✓', de:'Bestätigen ✓', fr:'Confirmer ✓', ru:'Подтвердить ✓' };
      const cancels  = { en:'Cancel', tr:'İptal', ar:'إلغاء', es:'Cancelar', de:'Abbrechen', fr:'Annuler', ru:'Отмена' };
      const nexts    = { en:'Next →', tr:'İleri →', ar:'→ التالي', es:'Siguiente →', de:'Weiter →', fr:'Suivant →', ru:'Далее →' };
      const backs    = { en:'← Back', tr:'← Geri', ar:'رجوع ←', es:'← Atrás', de:'← Zurück', fr:'← Retour', ru:'← Назад' };
      const cashL    = { en:'Cash on Delivery', tr:'Kapıda Nakit', ar:'الدفع نقداً عند التوصيل', es:'Pago en efectivo', de:'Barzahlung', fr:'Espèces à la livraison', ru:'Наличные при доставке' };
      const cardL    = { en:'Card on Delivery', tr:'Kapıda Kart', ar:'البطاقة عند التوصيل', es:'Tarjeta a la entrega', de:'Kartenzahlung', fr:'Carte à la livraison', ru:'Картой при доставке' };
      const bankL    = { en:'Bank Transfer', tr:'Banka Transferi', ar:'تحويل بنكي', es:'Transferencia bancaria', de:'Banküberweisung', fr:'Virement bancaire', ru:'Банковский перевод' };
      const csL1     = { en:'Items', tr:'Ürünler', ar:'العناصر', es:'Artículos', de:'Artikel', fr:'Articles', ru:'Товары' };
      const csL2     = { en:'Details', tr:'Bilgiler', ar:'التفاصيل', es:'Detalles', de:'Details', fr:'Détails', ru:'Детали' };
      const csL3     = { en:'Payment', tr:'Ödeme', ar:'الدفع', es:'Pago', de:'Zahlung', fr:'Paiement', ru:'Оплата' };
      const csL4     = { en:'Confirm', tr:'Onayla', ar:'تأكيد', es:'Confirmar', de:'Bestätigen', fr:'Confirmer', ru:'Подтвердить' };

      document.getElementById('deliveryTitle').textContent  = titles[L];
      document.getElementById('labelName').textContent      = names[L];
      document.getElementById('labelPhone').textContent     = phones[L];
      document.getElementById('labelAddress').textContent   = addrs[L];
      document.getElementById('paymentTitle').textContent   = payTitl[L];
      document.getElementById('deliverySend').textContent   = sends[L];
      document.getElementById('deliveryCancel').textContent = cancels[L];
      document.getElementById('coNext').textContent         = nexts[L];
      document.getElementById('coBack').textContent         = backs[L];
      document.getElementById('optCash').textContent        = cashL[L];
      document.getElementById('optCard').textContent        = cardL[L];
      document.getElementById('optBank').textContent        = bankL[L];
      document.getElementById('csLabel1').textContent       = csL1[L];
      document.getElementById('csLabel2').textContent       = csL2[L];
      document.getElementById('csLabel3').textContent       = csL3[L];
      document.getElementById('csLabel4').textContent       = csL4[L];
    }

    function showDeliveryModal() {
      updateDeliveryModalLabels();
      document.getElementById('coScreen1').style.display = '';
      document.getElementById('coScreen2').style.display = 'none';
      ['delName','delPhone','delAddress'].forEach(id => { document.getElementById(id).value = ''; });
      document.querySelectorAll('.pay-card').forEach(c => c.classList.remove('pay-selected'));
      document.querySelectorAll('input[name="delPayment"]').forEach(r => { r.checked = false; });
      _setCheckoutStep(2);
      document.getElementById('deliveryModal').style.display = 'flex';
    }

    function hideDeliveryModal() {
      document.getElementById('deliveryModal').style.display = 'none';
    }

    // Payment card tap → highlight
    document.querySelectorAll('.pay-card').forEach(card => {
      card.addEventListener('click', () => {
        document.querySelectorAll('.pay-card').forEach(c => c.classList.remove('pay-selected'));
        card.classList.add('pay-selected');
        card.querySelector('input[type="radio"]').checked = true;
      });
    });

    document.getElementById('deliveryCancel').addEventListener('click', hideDeliveryModal);
    document.getElementById('deliveryModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) hideDeliveryModal();
    });

    document.getElementById('coNext').addEventListener('click', () => {
      const name    = document.getElementById('delName').value.trim();
      const phone   = document.getElementById('delPhone').value.trim();
      const address = document.getElementById('delAddress').value.trim();
      const L = state.lang;
      if (!name || !phone || !address) {
        alert(L==='tr' ? 'Lütfen tüm alanları doldurun.' : L==='ar' ? 'يرجى ملء جميع الحقول.' : L==='de' ? 'Bitte alle Felder ausfüllen.' : L==='fr' ? 'Veuillez remplir tous les champs.' : L==='ru' ? 'Пожалуйста, заполните все поля.' : 'Please fill in all fields.');
        return;
      }
      document.getElementById('coScreen1').style.display = 'none';
      document.getElementById('coScreen2').style.display = '';
      _setCheckoutStep(3);
    });

    document.getElementById('coBack').addEventListener('click', () => {
      document.getElementById('coScreen2').style.display = 'none';
      document.getElementById('coScreen1').style.display = '';
      _setCheckoutStep(2);
    });

    document.getElementById('deliverySend').addEventListener('click', () => {
      const payment = document.querySelector('input[name="delPayment"]:checked');
      const L = state.lang;
      if (!payment) {
        alert(L==='tr' ? 'Lütfen bir ödeme yöntemi seçin.' : L==='ar' ? 'يرجى اختيار طريقة الدفع.' : L==='de' ? 'Bitte Zahlungsmethode wählen.' : L==='fr' ? 'Veuillez choisir un mode de paiement.' : L==='ru' ? 'Выберите способ оплаты.' : 'Please select a payment method.');
        return;
      }
      _setCheckoutStep(4);
      const info = {
        name: document.getElementById('delName').value.trim(),
        phone: document.getElementById('delPhone').value.trim(),
        address: document.getElementById('delAddress').value.trim(),
        payment: payment.value
      };
      hideDeliveryModal();
      sendToWhatsApp(info);
    });

    /* ====== Cart drawer open / close ====== */
    function openCart() {
      document.getElementById('cartDrawer').classList.add('cart-open');
      document.getElementById('cartOverlay').classList.add('cart-open');
      document.body.style.overflow = 'hidden';
    }
    function closeCart() {
      document.getElementById('cartDrawer').classList.remove('cart-open');
      document.getElementById('cartOverlay').classList.remove('cart-open');
      document.body.style.overflow = '';
    }
    document.getElementById('cartIconBtn').addEventListener('click', openCart);
    document.getElementById('cartCloseBtn').addEventListener('click', closeCart);
    document.getElementById('cartOverlay').addEventListener('click', closeCart);
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeCart(); });

    /* ====== Checkout button ====== */
    document.getElementById('checkoutBtn').addEventListener('click', ()=>{
      if(state.order.length === 0){
        alert((state.lang==='tr') ? 'Lütfen önce bir öğe ekleyin.' : (state.lang==='ar') ? 'يرجى إضافة عنصر أولاً.' : 'Please add an item first.');
        return;
      }

      if (!navigator.geolocation) {
        // No geolocation support — assume delivery
        showDeliveryModal();
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const dist = haversineDistance(pos.coords.latitude, pos.coords.longitude, RESTAURANT_LAT, RESTAURANT_LNG);
          if (dist <= DINE_IN_RADIUS_M) {
            sendToWhatsApp(null); // dine-in
          } else {
            showDeliveryModal(); // delivery
          }
        },
        () => {
          // Permission denied or error — assume delivery
          showDeliveryModal();
        },
        { enableHighAccuracy: true, timeout: 8000 }
      );
    });

    /* ====== Initial render ====== */
    loadPrices();
  </script>

  <!-- Theme toggle logic -->
  <script>
    (function(){
      const btn = document.getElementById('themeToggle');
      const root = document.documentElement;
      function getInitialTheme() {
        const saved = sessionStorage.getItem('dho_theme');
        if (saved === 'light' || saved === 'dark') return saved;
        const h = new Date().getHours();
        return (h >= 7 && h < 19) ? 'light' : 'dark';
      }
      function applyTheme(light) {
        if (light) { root.classList.add('light-mode'); btn.textContent = '☀️'; btn.title = 'Switch to dark mode'; }
        else { root.classList.remove('light-mode'); btn.textContent = '🌙'; btn.title = 'Switch to light mode'; }
      }
      applyTheme(getInitialTheme() === 'light');
      btn.addEventListener('click', function(){
        const goLight = !root.classList.contains('light-mode');
        sessionStorage.setItem('dho_theme', goLight ? 'light' : 'dark');
        applyTheme(goLight);
      });
    })();
  </script>

     class="fixed bottom-4 left-4 z-50 w-10 h-10 rounded-full bg-[#ffd24a] text-[#072033] shadow-[0_4px_14px_rgba(0,0,0,0.4)] flex items-center justify-center cursor-pointer hover:scale-110 opacity-0 pointer-events-none"
     style="transition: opacity 0.3s, transform 0.2s;">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5">
      <polyline points="18 15 12 9 6 15"></polyline>
    </svg>
  </button>
  <script>
    const backToTopBtn = document.getElementById('backToTop');
    const collapseAllBtn = document.getElementById('collapseAllBtn');

    collapseAllBtn.addEventListener('click', () => {
      openSections.clear();
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    function updateFloatingButtons() {
      const scrolled = window.scrollY > 300;
      const hasOpen = openSections.size > 0;
      // Back to top: show when scrolled
      backToTopBtn.style.opacity = scrolled ? '1' : '0';
      backToTopBtn.style.pointerEvents = scrolled ? 'auto' : 'none';
      // Collapse all: show when any section is open
      collapseAllBtn.style.opacity = hasOpen ? '1' : '0';
      collapseAllBtn.style.pointerEvents = hasOpen ? 'auto' : 'none';
    }

    window.addEventListener('scroll', updateFloatingButtons);
  </script>
