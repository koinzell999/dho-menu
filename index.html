<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Menu — DHO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Theme: apply instantly before paint to prevent flash -->
  <script>
    (function(){
      localStorage.removeItem('dho_theme');
      var t = sessionStorage.getItem('dho_theme');
      if(!t){
        var h = new Date().getHours();
        t = (h >= 7 && h < 19) ? 'light' : 'dark';
      }
      if(t === 'light') document.documentElement.classList.add('light-mode');
    })();
  </script>
  <style>
    /* === CSS Variables — Dark (default) === */
    :root {
      --bg-from: #0b2b4a;
      --bg-to: #072033;
      --text-primary: #f7f7f7;
      --text-secondary: #cbd5e1;
      --accent: #ffd24a;
      --accent-dark: #072033;
      --surface: rgba(255,255,255,0.02);
      --surface-end: rgba(255,255,255,0.01);
      --surface-hover: rgba(255,255,255,0.04);
      --surface-card: rgba(255,255,255,0.03);
      --border: rgba(255,255,255,0.03);
      --border-light: rgba(255,255,255,0.06);
      --shadow: rgba(2,6,23,0.6);
      --item-border: rgba(255,255,255,0.02);
      --toolbar-bg: rgba(11,43,74,0.8);
      --banner-bg: rgba(11,43,74,0.95);
      --logo-shadow: rgba(0,0,0,0.35);
    }

    /* === CSS Variables — Light mode === */
    .light-mode {
      --bg-from: #d8dce3;
      --bg-to: #cdd3db;
      --text-primary: #1a2332;
      --text-secondary: #4a5568;
      --accent: #b8891a;
      --accent-dark: #f5f5f5;
      --surface: rgba(0,0,0,0.03);
      --surface-end: rgba(0,0,0,0.02);
      --surface-hover: rgba(0,0,0,0.06);
      --surface-card: rgba(0,0,0,0.04);
      --border: rgba(0,0,0,0.08);
      --border-light: rgba(0,0,0,0.12);
      --shadow: rgba(0,0,0,0.15);
      --item-border: rgba(0,0,0,0.06);
      --toolbar-bg: rgba(216,220,227,0.92);
      --banner-bg: rgba(216,220,227,0.95);
      --logo-shadow: rgba(0,0,0,0.18);
    }

    /* === Smooth theme transition === */
    body, .page-card, #app, #aside, footer, #cookieBanner,
    .menu-item, #menu h2, #catNav button {
      transition: background 0.25s ease, color 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    }

    /* === Prevent horizontal overflow on all devices === */
    html { overflow-x: hidden; scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
    body { overflow-x: hidden; background: linear-gradient(to bottom, var(--bg-from), var(--bg-to)) !important; color: var(--text-primary) !important; }
    img { max-width: 100%; height: auto; display: block; }

    /* === Menu item interactions === */
    .menu-item {
      transition: transform 0.22s ease, background 0.22s ease, box-shadow 0.22s ease;
      -webkit-tap-highlight-color: transparent;
      border-bottom: 1px solid rgba(255,255,255,0.02);
    }
    .menu-item:last-child { border-bottom: none; }
    .menu-item:hover, .menu-item:active { transform: none; background: rgba(255,255,255,0.04); box-shadow: 0 2px 12px rgba(0,0,0,0.22); }
    .menu-item:active { transform: none; }
    .menu-item .item-name { transition: font-size 0.15s ease, letter-spacing 0.15s ease; display: inline-block; }
    .menu-item:hover .item-name, .menu-item:active .item-name { font-size: 1.05em; letter-spacing: 0.3px; }
    .menu-item .item-ingredients {
      display: none;
      font-size: 0.72rem;
      line-height: 1.25;
      color: var(--text-secondary);
      opacity: 0.92;
      margin-top: 4px;
      font-style: italic;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 280px;
    }
    .menu-item:hover .item-ingredients,
    .menu-item:focus-visible .item-ingredients,
    .menu-item:active .item-ingredients,
    .menu-item.show-ingredients .item-ingredients { display: block; }

    /* Info toggle button */
    .ing-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 15px; height: 15px; border-radius: 50%;
      font-size: 10px; font-style: normal; line-height: 1; font-weight: 700;
      cursor: pointer; vertical-align: middle; margin-left: 4px;
      background: color-mix(in srgb, var(--accent) 18%, transparent);
      color: var(--accent); border: 1px solid color-mix(in srgb, var(--accent) 35%, transparent);
      transition: background 0.15s, transform 0.15s;
      flex-shrink: 0; user-select: none;
    }
    .ing-btn:hover { background: color-mix(in srgb, var(--accent) 35%, transparent); transform: scale(1.15); }
    .menu-item.show-ingredients .ing-btn { background: var(--accent); color: var(--accent-dark); }

    /* === Size toggle buttons === */
    .size-toggle { display:inline-flex; gap:2px; margin-left:6px; flex-shrink:0; vertical-align:middle; }
    .size-btn {
      padding: 1px 7px; border-radius: 6px; font-size: 10px; font-weight: 700; cursor: pointer;
      border: 1px solid color-mix(in srgb, var(--accent) 35%, transparent);
      background: transparent; color: var(--text-secondary); transition: all 0.15s;
    }
    .size-btn.active {
      background: var(--accent); color: var(--accent-dark); border-color: var(--accent);
    }
    .size-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

    /* === Image normalization === */
    .menu-item img.item-thumb {
      transition: transform 0.15s ease;
      cursor: zoom-in;
      width: 64px; height: 48px !important;
      object-fit: cover;
      border-radius: 8px;
      flex-shrink: 0;
      align-self: center;
    }
    .menu-item:hover img.item-thumb { transform: scale(1.08); }

    /* === Lightbox === */
    #lightbox { display:none; position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,0.85); backdrop-filter:blur(8px); align-items:center; justify-content:center; cursor:zoom-out; animation: fadeIn 0.2s ease; padding: 16px; }
    #lightbox.active { display:flex; }
    #lightbox img { max-width:90vw; max-height:80vh; border-radius:12px; box-shadow:0 8px 40px rgba(0,0,0,0.6); animation: zoomIn 0.25s ease; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    @keyframes zoomIn { from{transform:scale(0.7);opacity:0} to{transform:scale(1);opacity:1} }

    /* === Category nav — horizontal scroll on small screens === */
    #catNav { -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    #catNav::-webkit-scrollbar { display: none; }
    #catNav button { backdrop-filter: blur(4px); }

    /* === Premium: brand glow === */
    #brandName { text-shadow: 0 2px 8px rgba(255, 210, 74, 0.15); }

    /* === Desktop: sticky order sidebar === */
    @media (min-width: 1024px) {
      #aside { position: sticky; top: 16px; align-self: start; }
      /* Keep desktop list flow identical to tablet/phone for stable hover behavior */
      .menu-items-grid {
        display: block;
        gap: 0;
      }
      .menu-items-grid .menu-item {
        border: none;
        border-bottom: 1px solid var(--item-border);
        border-radius: 0;
        background: transparent;
      }
      .menu-items-grid .menu-item:last-child { border-bottom: none; }
      /* Tighter header on desktop */
      #app > header { margin-bottom: 10px; }
      #app > header .w-20 { width: 56px !important; height: 56px !important; }
      #brandName { font-size: 1.35rem !important; }
    }

    /* === ≤1024px — Small laptops / large tablets === */
    @media (max-width: 1024px) {
      #app { max-width: 100% !important; }
    }

    /* === ≤768px — Tablets === */
    @media (max-width: 768px) {
      #aside { margin-top: 8px; }
    }

    /* === ≤480px — Standard phones === */
    @media (max-width: 480px) {
      #catNav {
        flex-wrap: wrap !important;
        justify-content: center !important;
        gap: 6px !important;
      }
      #catNav button { white-space: nowrap; flex-shrink: 0; font-size: 0.72rem !important; padding: 6px 10px !important; }
      .menu-item img.item-thumb { width: 56px; height: 42px; }
      #lightbox img { max-width: 95vw; max-height: 70vh; border-radius: 8px; }
    }

    /* === ≤360px — Very small phones === */
    @media (max-width: 360px) {
      body { padding: 4px !important; }
      #app { padding: 8px !important; border-radius: 8px !important; }
      /* Shrink logo */
      header .w-20 { width: 3.5rem !important; height: 3.5rem !important; }
      #brandName { font-size: 1.25rem !important; }
      /* Tighter category nav */
      #catNav { gap: 6px !important; }
      #catNav button { font-size: 0.7rem !important; padding: 6px 10px !important; }
      /* Compact section headers */
      #menu h2 { font-size: 0.85rem !important; padding: 8px !important; }
      /* Smaller menu items */
      .menu-item .item-name { font-size: 0.82rem !important; }
      .menu-item img.item-thumb { width: 48px; height: 36px; }
      /* Compact order panel */
      #aside { padding: 10px !important; }
      #aside h3 { font-size: 0.95rem !important; }
      /* Smaller floating buttons */
      #backToTop, #collapseAllBtn, #whatsappBtn { width: 36px !important; height: 36px !important; }
      #collapseAllBtn { bottom: 60px !important; }
      #whatsappBtn { bottom: 108px !important; }
    }

    /* === ≥1440px — Large desktops === */
    @media (min-width: 1440px) {
      #app { max-width: 1200px !important; }
      .menu-items-grid {
        display: block !important;
        gap: 0;
      }
    }

    /* === Order panel rows === */
    .order-row { display:flex; align-items:center; gap:6px; padding:6px 0; border-bottom:1px solid var(--border); }
    .order-row:last-child { border-bottom:none; }
    .order-row-name { flex:1; font-size:0.82rem; font-weight:600; color:var(--text-primary); min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .qty-ctrl { display:inline-flex; align-items:center; gap:3px; flex-shrink:0; }
    .qty-btn { width:22px; height:22px; border-radius:50%; border:1px solid color-mix(in srgb,var(--accent) 40%,transparent); background:color-mix(in srgb,var(--accent) 10%,transparent); color:var(--accent); font-size:14px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background 0.15s; padding:0; }
    .qty-btn:hover { background:color-mix(in srgb,var(--accent) 28%,transparent); }
    .qty-num { font-size:0.82rem; font-weight:700; min-width:20px; text-align:center; color:var(--text-primary); }
    .order-row-price { font-size:0.82rem; font-weight:700; color:var(--text-primary); white-space:nowrap; flex-shrink:0; }
    .remove-btn { width:20px; height:20px; border-radius:50%; border:1px solid rgba(255,80,80,0.3); background:rgba(255,80,80,0.07); color:#ff7070; font-size:11px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background 0.15s; padding:0; }
    .remove-btn:hover { background:rgba(255,80,80,0.22); }
    .clear-all-btn { font-size:0.7rem; cursor:pointer; background:none; border:none; padding:0; text-decoration:underline; opacity:0.65; }
    .clear-all-btn:hover { opacity:1; }

    /* === ≥2560px — 4K displays === */
    @media (min-width: 2560px) {
      #app { max-width: 1400px !important; }
      body { font-size: 1.1rem; }
      .menu-item img.item-thumb { width: 80px; height: 60px; }
      #catNav button { font-size: 1rem !important; padding: 10px 20px !important; }
      .menu-items-grid {
        display: block !important;
        gap: 0;
      }
    }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="m-0 min-h-screen font-sans bg-gradient-to-b from-[#0b2b4a] to-[#072033] text-[#f7f7f7] antialiased p-2 sm:p-6 flex flex-col items-center">
  <!-- Language switcher + Theme toggle — top-right -->
  <div class="fixed top-2 right-2 z-50 flex gap-1 items-center backdrop-blur rounded-lg px-1.5 py-1" style="background:var(--toolbar-bg); border:1px solid var(--border-light);" role="toolbar" aria-label="Language switcher">
    <button class="bg-transparent border-none py-0.5 px-1.5 rounded cursor-pointer font-semibold text-[11px]" style="color:var(--text-secondary);" data-lang="en">EN</button>
    <button class="bg-transparent border-none py-0.5 px-1.5 rounded cursor-pointer font-semibold text-[11px]" style="color:var(--text-secondary);" data-lang="tr">TR</button>
    <button class="bg-transparent border-none py-0.5 px-1.5 rounded cursor-pointer font-semibold text-[11px]" style="color:var(--text-secondary);" data-lang="ar">ع</button>
    <button class="bg-transparent border-none py-0.5 px-1.5 rounded cursor-pointer font-semibold text-[11px]" style="color:var(--text-secondary);" data-lang="es">ES</button>
    <span style="color:var(--border-light); margin:0 2px;">|</span>
    <button id="themeToggle" class="bg-transparent border-none py-0.5 px-1 rounded cursor-pointer text-sm" title="Toggle light/dark mode" aria-label="Toggle theme">🌙</button>
    <a href="admin.html" class="text-[10px] ml-1" style="color:var(--text-secondary); opacity:0.6;">Admin</a>
  </div>

  <div class="w-full max-w-[980px] rounded-xl p-3 sm:p-5" style="background:linear-gradient(to bottom, var(--surface), var(--surface-end)); box-shadow:0 8px 30px var(--shadow); border:1px solid var(--border);" id="app">
    <header class="flex flex-col items-center gap-2 sm:gap-3 mb-3 sm:mb-[18px] max-[880px]:gap-2">
      <!-- Logo + Brand -->
      <div class="flex flex-col items-center gap-2">
        <a href="qrcode.html" class="w-20 h-20 rounded-full bg-[#ffd24a] flex items-center justify-center shrink-0 overflow-hidden" style="box-shadow:0 6px 18px var(--logo-shadow);">
          <img src="logo.png" alt="DHO Logo" id="logoImg" class="w-full h-full object-cover block" />
        </a>
        <div class="leading-none text-center">
          <h1 id="brandName" class="m-0 text-2xl tracking-[0.2px] font-bold">DHO</h1>
        </div>
      </div>
    </header>

    <!-- Category Navigation -->
    <nav id="catNav" class="flex flex-wrap justify-center gap-2 mb-4" role="navigation" aria-label="Menu categories"></nav>

    <main class="grid grid-cols-1 lg:grid-cols-[1fr_320px] gap-3 sm:gap-[18px]">
      <section class="p-2 sm:p-3 rounded-xl min-h-[320px]" style="background:var(--surface-card);" id="menu"></section>

      <aside class="p-[14px] rounded-xl lg:min-h-[320px]" style="background:linear-gradient(to bottom, var(--surface), var(--surface-end)); border:1px solid var(--border);" id="aside">
        <h3 id="orderTitle" class="mt-0" style="color:var(--accent);">Order Summary</h3>
        <p class="text-sm mb-3" style="color:var(--text-secondary);" id="orderNote">Tap items to add them to the order.</p>
        <div id="orderList" class="min-h-[120px]" style="color:var(--text-secondary);"></div>
        <div class="mt-[18px] flex justify-between items-center gap-3">
          <div style="color:var(--text-secondary);"><strong id="totalLabel" class="font-bold">Total</strong><div id="totalPrice">₺0</div></div>
          <button class="border-none py-[10px] px-[14px] rounded-[10px] font-bold cursor-pointer" style="background:var(--accent); color:var(--accent-dark);" id="checkoutBtn">Checkout</button>
        </div>
      </aside>
    </main>
  </div>

  <!-- Lightbox overlay -->
  <div id="lightbox" onclick="this.classList.remove('active')">
    <img id="lightboxImg" src="" alt="" />
  </div>

  <!-- Delivery info modal -->
  <div id="deliveryModal" class="fixed inset-0 z-[9998] items-center justify-center p-4" style="display:none; background:rgba(0,0,0,0.7); backdrop-filter:blur(6px);">
    <div class="w-full max-w-[400px] mx-auto rounded-xl p-5" style="background:linear-gradient(to bottom, var(--bg-from), var(--bg-to)); border:1px solid var(--border-light); box-shadow:0 8px 30px rgba(0,0,0,0.5);">
      <h3 id="deliveryTitle" class="mt-0 mb-4 text-lg" style="color:var(--accent);">Delivery Details</h3>
      <form id="deliveryForm" class="space-y-3">
        <div>
          <label id="labelName" class="block text-xs font-bold mb-1" style="color:var(--text-secondary);">Name</label>
          <input type="text" id="delName" required class="w-full p-2 rounded text-sm" style="background:var(--surface-card); border:1px solid var(--border-light); color:var(--text-primary);" autocomplete="name">
        </div>
        <div>
          <label id="labelPhone" class="block text-xs font-bold mb-1" style="color:var(--text-secondary);">Phone</label>
          <input type="tel" id="delPhone" required class="w-full p-2 rounded text-sm" style="background:var(--surface-card); border:1px solid var(--border-light); color:var(--text-primary);" autocomplete="tel">
        </div>
        <div>
          <label id="labelAddress" class="block text-xs font-bold mb-1" style="color:var(--text-secondary);">Address</label>
          <textarea id="delAddress" required rows="2" class="w-full p-2 rounded text-sm resize-none" style="background:var(--surface-card); border:1px solid var(--border-light); color:var(--text-primary);"></textarea>
        </div>
        <div>
          <label id="labelPayment" class="block text-xs font-bold mb-1" style="color:var(--text-secondary);">Payment Method</label>
          <select id="delPayment" required class="w-full p-2 rounded text-sm" style="background:var(--surface-card); border:1px solid var(--border-light); color:var(--text-primary);">
            <option value="cash" id="optCash">Cash on Delivery</option>
            <option value="card" id="optCard">Card on Delivery</option>
          </select>
        </div>
        <div class="flex gap-2 pt-2">
          <button type="submit" id="deliverySend" class="flex-1 py-2 rounded font-bold text-sm cursor-pointer" style="background:var(--accent); color:var(--accent-dark); border:none;">Send Order</button>
          <button type="button" id="deliveryCancel" class="flex-1 py-2 rounded font-bold text-sm cursor-pointer" style="background:transparent; color:var(--text-secondary); border:1px solid var(--border-light);">Cancel</button>
        </div>
      </form>
    </div>
  </div>

    /* ====== Weekly click tracking ====== */
    function getWeekKey() {
      const now = new Date();
      const jan1 = new Date(now.getFullYear(), 0, 1);
      const days = Math.floor((now - jan1) / 86400000);
      const week = Math.ceil((days + jan1.getDay() + 1) / 7);
      return now.getFullYear() + '-W' + String(week).padStart(2, '0');
    }

    function recordClick(itemKey) {
      const weekKey = getWeekKey();
      db.collection("clicks").doc(weekKey).set(
        { [itemKey]: firebase.firestore.FieldValue.increment(1) },
        { merge: true }
      ).catch(err => console.warn("Click tracking failed:", err));
    }

    async function loadWeeklyPopular() {
      try {
        const weekKey = getWeekKey();
        const doc = await db.collection("clicks").doc(weekKey).get();
        if (doc.exists) {
          const data = doc.data();
          // Build reverse map: L key → M key
          const lToM = {};
          Object.entries(sizePairs).forEach(([m, l]) => { lToM[l] = m; });
          // All M-only item keys from every category (except popular itself)
          const allItemKeys = new Set();
          menuStructure.forEach(cat => {
            if (cat.key !== 'popular') cat.items.forEach(k => allItemKeys.add(k));
          });
          // Merge L clicks into their M counterpart
          const merged = {};
          Object.entries(data).forEach(([k, v]) => {
            const mKey = lToM[k] || k;
            if (!allItemKeys.has(mKey)) return;
            merged[mKey] = (merged[mKey] || 0) + v;
          });
          // Sort by click count descending, take top 6
          const sorted = Object.entries(merged)
            .filter(([k]) => !hiddenItems[k])
            .sort((a, b) => b[1] - a[1])
            .slice(0, 6)
            .map(([k]) => k);
          if (sorted.length > 0) weeklyPopularItems = sorted;
        }
      } catch (err) {
        console.warn("Failed to load popular items:", err);
      }
    }

      try {
        const [priceDoc, settingsDoc] = await Promise.all([
          db.collection("prices").doc("menu").get(),
          db.collection("settings").doc("menu").get()
        ]);
        if (priceDoc.exists) {
          const remote = priceDoc.data();
          // Only apply remote prices for keys that exist in the current menu
          const merged = { ...defaultPrices };
          for (const key of Object.keys(defaultPrices)) {
            if (remote[key] !== undefined) merged[key] = remote[key];
          }
          prices = merged;
        }
        if (settingsDoc.exists) {
          hiddenItems = settingsDoc.data().hiddenItems || {};
          imageOverrides = settingsDoc.data().imageOverrides || {};
        }
      } catch (e) {
        console.error("Error loading prices:", e);
      }
      await loadWeeklyPopular();
      // Update popular category with this week's top items (fallback to pop1)
      const popCat = menuStructure.find(c => c.key === 'popular');
      if (popCat) {
        popCat.items = weeklyPopularItems.length > 0 ? weeklyPopularItems : ['pop1'];
      }
      render();

    function render(){
            // Debug: log translation object and menu items in Spanish mode
            if (state.lang === 'es') {
              console.log('Spanish translation object:', translations.es);
              console.log('Menu structure:', menuStructure);
            }
      // Robust fallback: always use English if translation object or key is missing
      const t = Object.assign({}, translations.en, translations[state.lang] || {});
      document.documentElement.lang = state.lang;
      document.documentElement.dir = (state.lang === 'ar') ? 'rtl' : 'ltr';

      document.getElementById('brandName').textContent = t.brand;
      document.getElementById('orderTitle').textContent = t.orderTitle;
      document.getElementById('orderNote').textContent = t.orderNote;
      document.getElementById('totalLabel').textContent = t.totalLabel;
      document.getElementById('checkoutBtn').textContent = t.checkout;

      document.querySelectorAll('[data-lang]').forEach(btn=>{
        const isActive = btn.dataset.lang === state.lang;
        if(isActive){
          btn.style.background = 'var(--accent)';
          btn.style.color = 'var(--accent-dark)';
        } else {
          btn.style.background = 'transparent';
          btn.style.color = 'var(--text-secondary)';
        }
      });

      const menuEl = document.getElementById('menu');
      menuEl.innerHTML = '';
      let anyItems = false;
      menuStructure.forEach(cat=>{
        // In Spanish mode, ignore hiddenItems (show all items)
        const visibleItems = (state.lang === 'es')
          ? cat.items
          : cat.items.filter(itemKey => !hiddenItems[itemKey]);
        if (visibleItems.length === 0) return;
        anyItems = true;

        const catDiv = document.createElement('div');
        catDiv.className = 'mb-[6px] rounded-xl';
        catDiv.style.border = '1px solid var(--border)';
        catDiv.id = 'cat-' + cat.key;

        const isOpen = openSections.has(cat.key);

        const h2 = document.createElement('h2');
        h2.innerHTML = `<span class="flex items-center gap-2">${catIcons[cat.key] || ''}<span>${t.categories[cat.key]}</span></span>`;
        h2.className = 'm-0 text-base flex items-center justify-between gap-[10px] p-3 cursor-pointer select-none transition-colors';
        h2.style.color = 'var(--accent)';
        h2.style.background = 'var(--surface-card)';
        const arrow = document.createElement('span');
        arrow.textContent = isOpen ? '▾' : '▸';
        arrow.className = 'text-sm transition-transform';
        h2.appendChild(arrow);
        catDiv.appendChild(h2);

        const itemsContainer = document.createElement('div');
        itemsContainer.className = 'menu-items-grid transition-all duration-300 ease-in-out';
        itemsContainer.style.maxHeight = isOpen ? '4000px' : '0';
        itemsContainer.style.opacity = isOpen ? '1' : '0';
        itemsContainer.style.overflow = isOpen ? 'visible' : 'hidden';

        h2.addEventListener('click', ()=>{
          if(openSections.has(cat.key)){
            openSections.delete(cat.key);
            itemsContainer.style.maxHeight = '0';
            itemsContainer.style.opacity = '0';
            itemsContainer.style.overflow = 'hidden';
            arrow.textContent = '▸';
          } else {
            openSections.add(cat.key);
            itemsContainer.style.maxHeight = '4000px';
            itemsContainer.style.opacity = '1';
            itemsContainer.style.overflow = 'visible';
            arrow.textContent = '▾';
          }
          if (typeof updateFloatingButtons === 'function') updateFloatingButtons();
        });

        visibleItems.forEach(itemKey=>{
          let itemData = t.items[itemKey];
          // Fallback to English if missing in Spanish
          if (!itemData && state.lang === 'es') itemData = translations.en.items[itemKey];
          if(!itemData) return;
          const hasSizes = !!sizePairs[itemKey];
          const curSize = hasSizes ? (selectedSizes[itemKey] || 'm') : null;
          const activeKey = (hasSizes && curSize === 'l') ? sizePairs[itemKey] : itemKey;
          const activePrice = prices[activeKey];
          const displayName = hasSizes ? stripSizeFromName(itemData.name) : itemData.name;
          const currentImage = resolveImageOverrideUrl(imageOverrides[activeKey]) || itemImages[activeKey] || resolveImageOverrideUrl(imageOverrides[itemKey]) || itemImages[itemKey] || '';
          const ing = itemIngredients[activeKey] || itemIngredients[itemKey] || '';
          const itemEl = document.createElement('div');
          itemEl.className = 'menu-item flex justify-between gap-2 sm:gap-3 p-2 sm:p-[10px] rounded-[10px] items-center cursor-pointer';
          if (state.lang === 'ar') itemEl.style.direction = 'ltr';
          itemEl.tabIndex = 0;
          itemEl.setAttribute('role','button');
          itemEl.addEventListener('click', (e)=> {
            if (e.target.closest('.size-toggle')) return;
            const sz = selectedSizes[itemKey] || 'm';
            const key = (sizePairs[itemKey] && sz === 'l') ? sizePairs[itemKey] : itemKey;
            addToOrder(key);
          });
          itemEl.addEventListener('keypress', (e)=>{
            if(e.key==='Enter'){
              const sz = selectedSizes[itemKey] || 'm';
              const key = (sizePairs[itemKey] && sz === 'l') ? sizePairs[itemKey] : itemKey;
              addToOrder(key);
            }
          });

          const safeImgName = currentImage ? currentImage.replace(/'/g, "\\'") : '';
          const fallbackImage = itemImages[activeKey] || itemImages[itemKey] || '';
          const safeFallbackImage = fallbackImage ? fallbackImage.replace(/'/g, "\\'") : '';
          const imageHTML = currentImage
            ? `<img src="${currentImage}" alt="${displayName}" referrerpolicy="no-referrer" class="item-thumb w-16 h-12 rounded-lg object-cover border border-white/[0.08]" onerror="this.onerror=null; this.src='${safeFallbackImage}';" onclick="event.stopPropagation(); document.getElementById('lightboxImg').src='${safeImgName}'; document.getElementById('lightboxImg').alt='${displayName.replace(/'/g, "\\'") }'; document.getElementById('lightbox').classList.add('active');" />`
            : `<div class="w-10 h-10 rounded-lg flex items-center justify-center text-xs shrink-0" style="background:var(--surface-card); color:var(--text-secondary)"></div>`;

          const descHTML = itemData.desc ? `<div class="text-sm" style="color:var(--text-secondary)">${itemData.desc}</div>` : '';
          const ingToggleHTML = ing ? `<button class="ing-btn" title="Show ingredients" onclick="event.stopPropagation();this.closest('.menu-item').classList.toggle('show-ingredients');this.setAttribute('aria-expanded', this.closest('.menu-item').classList.contains('show-ingredients'))" aria-label="Toggle ingredients" aria-expanded="false">ⓘ</button>` : '';
          const ingHTML = ing ? `<div class="item-ingredients">🧂 ${ing}</div>` : '';

          // Size toggle HTML
          let sizeHTML = '';
          if (hasSizes) {
            const sl = sizeLabels[state.lang];
            sizeHTML = `<span class="size-toggle" data-itemkey="${itemKey}">` +
              `<button type="button" class="size-btn ${curSize === 'm' ? 'active' : ''}" data-size="m">${sl.m}</button>` +
              `<button type="button" class="size-btn ${curSize === 'l' ? 'active' : ''}" data-size="l">${sl.l}</button>` +
              `</span>`;
          }

          const isRTL = state.lang === 'ar';
          itemEl.innerHTML = isRTL ? `
            <div class="font-extrabold shrink-0" style="color:var(--text-primary)">${formatPrice(activePrice)}</div>
            <div class="flex gap-3 items-center min-w-0 flex-row-reverse text-right flex-1">
              ${imageHTML}
              <div class="min-w-0">
                <div class="font-bold item-name flex items-center gap-1 flex-wrap justify-end">${displayName}${sizeHTML}${ingToggleHTML}</div>
                ${descHTML}
                ${ingHTML}
              </div>
            </div>
          ` : `
            <div class="flex gap-3 items-center min-w-0">
              ${imageHTML}
              <div class="min-w-0">
                <div class="font-bold item-name flex items-center gap-1 flex-wrap">${displayName}${sizeHTML}${ingToggleHTML}</div>
                ${descHTML}
                ${ingHTML}
              </div>
            </div>
            <div class="font-extrabold shrink-0" style="color:var(--text-primary)">${formatPrice(activePrice)}</div>
          `;

          // Handle size toggle clicks
          if (hasSizes) {
            itemEl.querySelectorAll('.size-btn').forEach(btn => {
              btn.addEventListener('click', (e) => {
                e.stopPropagation();
                selectedSizes[itemKey] = btn.dataset.size;
                render();
              });
            });
          }

          itemsContainer.appendChild(itemEl);
        });

        catDiv.appendChild(itemsContainer);
        menuEl.appendChild(catDiv);
      });


      // If no items are shown in Spanish mode, show a visible error message
      if (state.lang === 'es' && !anyItems) {
        menuEl.innerHTML = '<div style="color:red;font-weight:bold;padding:2em;text-align:center">Error: No menu items found in Spanish mode.<br>Check translation keys and menu logic.</div>';
      }
      renderOrder();

      /* Build category nav buttons */
      const navBtns = [
        { key:'waffles', en:'Waffles', tr:'Waffle', ar:'وافل', es:'Waffles' },
        { key:'crepes', en:'Crêpes', tr:'Krep', ar:'كريب', es:'Crepes' },
        { key:'icecream', en:'Ice Cream', tr:'Dondurma', ar:'بوظة', es:'Helados' },
        { key:'milkshakes', en:'Milkshakes', tr:'Milkshake', ar:'ميلك شيك', es:'Batidos' },
        { key:'cocktails', en:'Cocktails', tr:'Kokteyller', ar:'كوكتيل', es:'Cócteles' },
        { key:'dhocakes', en:'Cakes', tr:'Kekler', ar:'كيك', es:'Pasteles' },
        { key:'salads', en:'Salads', tr:'Salatalar', ar:'سلطات', es:'Ensaladas' },
        { key:'drinks', en:'Drinks', tr:'İçecekler', ar:'مشروبات', es:'Bebidas' }
      ];
      const navEl = document.getElementById('catNav');
      navEl.innerHTML = '';
      navBtns.forEach(nb => {
        const btn = document.createElement('button');
        btn.textContent = nb[state.lang];
        btn.className = 'py-2 px-4 rounded-full cursor-pointer font-semibold text-sm transition-colors duration-150';
        btn.style.cssText = 'background:color-mix(in srgb, var(--accent) 10%, transparent); border:1px solid color-mix(in srgb, var(--accent) 30%, transparent); color:var(--accent);';
        btn.addEventListener('click', () => scrollToCategory(nb.key));
        navEl.appendChild(btn);
      });

    }

    function scrollToCategory(key) {
      /* Open the section if closed */
      if (!openSections.has(key)) {
        const catDiv = document.getElementById('cat-' + key);
        if (!catDiv) return;
        const h2 = catDiv.querySelector('h2');
        if (h2) h2.click();
      }
      /* Scroll into view */
      setTimeout(() => {
        const el = document.getElementById('cat-' + key);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 50);
    }

    function addToOrder(itemKey){
      const t = translations[state.lang];
      const item = t.items[itemKey];
      // Build display name with size label if applicable
      const lToM = {};
      Object.entries(sizePairs).forEach(([m, l]) => { lToM[l] = m; });
      const mKey = lToM[itemKey];
      const isLarge = !!mKey;
      const isMedium = !!sizePairs[itemKey];
      let orderName = item.name;
      if (isLarge || isMedium) {
        const sl = sizeLabels[state.lang];
        const sizeTag = isLarge ? sl.l : sl.m;
        orderName = stripSizeFromName(item.name) + ' (' + sizeTag + ')';
      }
      const existing = state.order.find(o => o.key === itemKey);
      if(existing){ existing.qty++; } else { state.order.push({ key:itemKey, name:orderName, price:prices[itemKey], qty:1 }); }
      recordClick(itemKey);
      renderOrder();
    }

    function changeQty(idx, delta){
      state.order[idx].qty += delta;
      if(state.order[idx].qty <= 0) state.order.splice(idx, 1);
      renderOrder();
    }

    function removeFromOrder(idx){
      state.order.splice(idx, 1);
      renderOrder();
    }

    function renderOrder(){
      const list = document.getElementById('orderList');
      list.innerHTML = '';
      const noItems = { en:'No items yet', tr:'Henüz öğe yok', ar:'لا توجد عناصر' };
      const clearLabel = { en:'Clear all', tr:'Temizle', ar:'مسح الكل' };
      if(state.order.length === 0){
        list.innerHTML = `<div style="color:var(--text-secondary);font-size:0.85rem">${noItems[state.lang]}</div>`;
      } else {
        const header = document.createElement('div');
        header.className = 'flex justify-end mb-1';
        header.innerHTML = `<button class="clear-all-btn" style="color:var(--text-secondary)" onclick="state.order=[];renderOrder()">${clearLabel[state.lang]}</button>`;
        list.appendChild(header);
        state.order.forEach((it, idx) => {
          const row = document.createElement('div');
          row.className = 'order-row';
          row.innerHTML = `
            <div class="order-row-name" title="${it.name}">${it.name}</div>
            <div class="qty-ctrl">
              <button class="qty-btn" onclick="changeQty(${idx},-1)" aria-label="Decrease">−</button>
              <span class="qty-num">${it.qty}</span>
              <button class="qty-btn" onclick="changeQty(${idx},1)" aria-label="Increase">+</button>
            </div>
            <div class="order-row-price">${formatPrice(it.price * it.qty)}</div>
            <button class="remove-btn" onclick="removeFromOrder(${idx})" aria-label="Remove item">✕</button>
          `;
          list.appendChild(row);
        });
      }
      const total = state.order.reduce((s,i) => s + i.price * i.qty, 0);
      document.getElementById('totalPrice').textContent = formatPrice(total);
    }

    /* ====== Language switcher ====== */
    document.querySelectorAll('[data-lang]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        state.lang = btn.dataset.lang;
        render();
      });
    });

    /* ====== Checkout helpers ====== */
    const RESTAURANT_LAT = 36.752126;
    const RESTAURANT_LNG = 34.533231;
    const DINE_IN_RADIUS_M = 200;

    function haversineDistance(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const toRad = d => d * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function buildReceipt(deliveryInfo) {
      const totalItems = state.order.reduce((s,i) => s + i.qty, 0);
      const total = state.order.reduce((s,i) => s + i.price * i.qty, 0);
      const L = state.lang;
      const headers = { en: '🧾 *DHO Order*', tr: '🧾 *DHO Sipariş*', ar: '🧾 *طلب DHO*' };
      const itemLabel = { en: 'Items', tr: 'Ürünler', ar: 'العناصر' };
      const totalLabel = { en: 'Total', tr: 'Toplam', ar: 'المجموع' };
      const thanksLabel = { en: 'Thank you! 🙏', tr: 'Teşekkürler! 🙏', ar: 'شكراً لكم! 🙏' };

      let msg = headers[L] + '\n';
      if (deliveryInfo) {
        const dlvLabel = { en: '🚚 *Delivery*', tr: '🚚 *Teslimat*', ar: '🚚 *توصيل*' };
        msg += dlvLabel[L] + '\n';
      }
      msg += '━━━━━━━━━━━━━━━\n';
      state.order.forEach(item => {
        msg += `• ${item.name} × ${item.qty} — ${formatPrice(item.price * item.qty)}\n`;
      });
      msg += '━━━━━━━━━━━━━━━\n';
      msg += `*${totalLabel[L]}:* ${formatPrice(total)} (${totalItems} ${itemLabel[L]})\n`;

      if (deliveryInfo) {
        const nameL = { en: 'Name', tr: 'İsim', ar: 'الاسم' };
        const phoneL = { en: 'Phone', tr: 'Telefon', ar: 'الهاتف' };
        const addrL = { en: 'Address', tr: 'Adres', ar: 'العنوان' };
        const payL = { en: 'Payment', tr: 'Ödeme', ar: 'الدفع' };
        const payValues = {
          cash: { en: 'Cash on Delivery', tr: 'Kapıda Nakit', ar: 'الدفع نقداً عند التوصيل' },
          card: { en: 'Card on Delivery', tr: 'Kapıda Kart', ar: 'الدفع بالبطاقة عند التوصيل' }
        };
        msg += '\n';
        msg += `📛 *${nameL[L]}:* ${deliveryInfo.name}\n`;
        msg += `📞 *${phoneL[L]}:* ${deliveryInfo.phone}\n`;
        msg += `📍 *${addrL[L]}:* ${deliveryInfo.address}\n`;
        msg += `💳 *${payL[L]}:* ${payValues[deliveryInfo.payment][L]}\n`;
      }

      msg += '\n' + thanksLabel[L];
      return msg;
    }

    function sendToWhatsApp(deliveryInfo) {
      const msg = buildReceipt(deliveryInfo || null);
      const encoded = encodeURIComponent(msg);
      window.open(`https://wa.me/905377177719?text=${encoded}`, '_blank');
      state.order = [];
      renderOrder();
    }

    function updateDeliveryModalLabels() {
      const L = state.lang;
      const titles = { en: 'Delivery Details', tr: 'Teslimat Bilgileri', ar: 'تفاصيل التوصيل', es: 'Detalles de entrega' };
      const names = { en: 'Name', tr: 'İsim', ar: 'الاسم', es: 'Nombre' };
      const phones = { en: 'Phone', tr: 'Telefon', ar: 'الهاتف', es: 'Teléfono' };
      const addrs = { en: 'Address', tr: 'Adres', ar: 'العنوان', es: 'Dirección' };
      const pays = { en: 'Payment Method', tr: 'Ödeme Yöntemi', ar: 'طريقة الدفع', es: 'Método de pago' };
      const sends = { en: 'Send Order', tr: 'Siparişi Gönder', ar: 'إرسال الطلب', es: 'Enviar pedido' };
      const cancels = { en: 'Cancel', tr: 'İptal', ar: 'إلغاء', es: 'Cancelar' };
      const cashL = { en: 'Cash on Delivery', tr: 'Kapıda Nakit', ar: 'الدفع نقداً عند التوصيل', es: 'Pago en efectivo' };
      const cardL = { en: 'Card on Delivery', tr: 'Kapıda Kart', ar: 'الدفع بالبطاقة عند التوصيل', es: 'Pago con tarjeta' };

      document.getElementById('deliveryTitle').textContent = titles[L];
      document.getElementById('labelName').textContent = names[L];
      document.getElementById('labelPhone').textContent = phones[L];
      document.getElementById('labelAddress').textContent = addrs[L];
      document.getElementById('labelPayment').textContent = pays[L];
      document.getElementById('deliverySend').textContent = sends[L];
      document.getElementById('deliveryCancel').textContent = cancels[L];
      document.getElementById('optCash').textContent = cashL[L];
      document.getElementById('optCard').textContent = cardL[L];
    }

    function showDeliveryModal() {
      updateDeliveryModalLabels();
      const modal = document.getElementById('deliveryModal');
      document.getElementById('deliveryForm').reset();
      modal.style.display = 'flex';
    }

    function hideDeliveryModal() {
      document.getElementById('deliveryModal').style.display = 'none';
    }

    document.getElementById('deliveryCancel').addEventListener('click', hideDeliveryModal);
    document.getElementById('deliveryModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) hideDeliveryModal();
    });

    document.getElementById('deliveryForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const info = {
        name: document.getElementById('delName').value.trim(),
        phone: document.getElementById('delPhone').value.trim(),
        address: document.getElementById('delAddress').value.trim(),
        payment: document.getElementById('delPayment').value
      };
      hideDeliveryModal();
      sendToWhatsApp(info);
    });

    /* ====== Checkout button ====== */
    document.getElementById('checkoutBtn').addEventListener('click', ()=>{
      if(state.order.length === 0){
        alert((state.lang==='tr') ? 'Lütfen önce bir öğe ekleyin.' : (state.lang==='ar') ? 'يرجى إضافة عنصر أولاً.' : 'Please add an item first.');
        return;
      }

      if (!navigator.geolocation) {
        // No geolocation support — assume delivery
        showDeliveryModal();
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const dist = haversineDistance(pos.coords.latitude, pos.coords.longitude, RESTAURANT_LAT, RESTAURANT_LNG);
          if (dist <= DINE_IN_RADIUS_M) {
            sendToWhatsApp(null); // dine-in
          } else {
            showDeliveryModal(); // delivery
          }
        },
        () => {
          // Permission denied or error — assume delivery
          showDeliveryModal();
        },
        { enableHighAccuracy: true, timeout: 8000 }
      );
    });

    /* ====== Initial render ====== */
    loadPrices();

  <!-- Theme toggle logic -->
  <script>
    (function(){
      const btn = document.getElementById('themeToggle');
      const root = document.documentElement;
      function getInitialTheme() {
        const saved = sessionStorage.getItem('dho_theme');
        if (saved === 'light' || saved === 'dark') return saved;
        const h = new Date().getHours();
        return (h >= 7 && h < 19) ? 'light' : 'dark';
      }
      function applyTheme(light) {
        if (light) { root.classList.add('light-mode'); btn.textContent = '☀️'; btn.title = 'Switch to dark mode'; }
        else { root.classList.remove('light-mode'); btn.textContent = '🌙'; btn.title = 'Switch to light mode'; }
      }
      applyTheme(getInitialTheme() === 'light');
      btn.addEventListener('click', function(){
        const goLight = !root.classList.contains('light-mode');
        sessionStorage.setItem('dho_theme', goLight ? 'light' : 'dark');
        applyTheme(goLight);
      });
    })();
  </script>

  <script>
    const backToTopBtn = document.getElementById('backToTop');
    const collapseAllBtn = document.getElementById('collapseAllBtn');
    const whatsappBtn = document.getElementById('whatsappBtn');

    collapseAllBtn.addEventListener('click', () => {
      openSections.clear();
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    function updateFloatingButtons() {
      const scrolled = window.scrollY > 300;
      const hasOpen = openSections.size > 0;
      // Back to top: show when scrolled
      backToTopBtn.style.opacity = scrolled ? '1' : '0';
      backToTopBtn.style.pointerEvents = scrolled ? 'auto' : 'none';
      // Collapse all: show when any section is open
      collapseAllBtn.style.opacity = hasOpen ? '1' : '0';
      collapseAllBtn.style.pointerEvents = hasOpen ? 'auto' : 'none';
      // WhatsApp: show when any section is open
      whatsappBtn.style.opacity = hasOpen ? '1' : '0';
      whatsappBtn.style.pointerEvents = hasOpen ? 'auto' : 'none';
    }

    window.addEventListener('scroll', updateFloatingButtons);
  </script>
